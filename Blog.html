<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vincent | Blog Article</title>
    <link rel="stylesheet" href="./reset.css">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="Home.css">
    <link rel="stylesheet" href="Blogs.css">
</head>

<body>
    <div id="nav-sheet" class="nav-sheet">
        <div class="nav-sheet-content">
            <a href="./Intro">Intro</a>
            <a href="./Award">Award</a>
            <a href="./Projects">Projects</a>
            <a href="./Contact">Contact</a>
        </div>
    </div>

    <header class="desktop-header">
        <nav>
            <a class="logo" href="./index">Vincent</a>
            <div class="nav-items desktop-nav">
                <a href="./Intro">Intro</a>
                <a href="./Award">Award</a>
                <a href="./Projects">Projects</a>
                <a href="./Contact">Contact</a>
            </div>
            <button id="nav-toggle" aria-label="Toggle Navigation">
                <span></span>
                <span></span>
            </button>
        </nav>
    </header>

    <main class="blog-shell blog-shell--article">
        <article id="blog-article" class="blog-layout" aria-live="polite">
            <a href="./Blogs" class="blog-back-link">Back to Blog</a>
            <header class="blog-header">
                <p id="blog-article-date" class="blog-date">Loading...</p>
                <h1 id="blog-article-title">Loading Article</h1>
                <p id="blog-article-intro" class="blog-intro">Please wait while the markdown content loads.</p>
            </header>
            <figure class="blog-cover-wrap">
                <img id="blog-article-image" src="img/vc.jpeg" alt="Article cover image">
            </figure>
            <section id="blog-markdown" class="blog-markdown">
                <p class="blog-loading">Loading content...</p>
            </section>
        </article>
    </main>

    <footer>
        <p>&copy; <span class="js-copyright-year" data-start-year="2025"></span> Vincent. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById('nav-toggle').addEventListener('click', function () {
            document.body.classList.toggle('nav-open');
        });

        document.addEventListener('click', function (event) {
            if (!event.target.closest('#nav-toggle') && !event.target.closest('#nav-sheet')) {
                document.body.classList.remove('nav-open');
            }
        });
    </script>
    <script src="site.js"></script>
    <script src="blog.js"></script>
</body>

</html>
