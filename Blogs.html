<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vincent | Blog</title>
    <link rel="stylesheet" href="./reset.css">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="Home.css">
    <link rel="stylesheet" href="Blogs.css">
</head>

<body>
    <div id="nav-sheet" class="nav-sheet">
        <div class="nav-sheet-content">
            <a href="./Intro">Intro</a>
            <a href="./Award">Award</a>
            <a href="./Projects">Projects</a>
            <a href="./Contact">Contact</a>
        </div>
    </div>

    <header class="desktop-header">
        <nav>
            <a class="logo" href="./index">Vincent</a>
            <div class="nav-items desktop-nav">
                <a href="./Intro">Intro</a>
                <a href="./Award">Award</a>
                <a href="./Projects">Projects</a>
                <a href="./Contact">Contact</a>
            </div>
            <button id="nav-toggle" aria-label="Toggle Navigation">
                <span></span>
                <span></span>
            </button>
        </nav>
    </header>

    <main class="blog-shell">
        <section class="blog-hero">
            <p class="blog-kicker">Writing</p>
            <h1>Notes on Building, Design, and Engineering Craft</h1>
            <p class="blog-subtitle">Readable cards, premium motion, and markdown-powered articles hosted from GitHub Raw.</p>
        </section>

        <section class="blog-feed">
            <div id="blog-list" class="blog-grid" aria-live="polite"></div>
            <p id="blog-empty" class="blog-empty" hidden>No posts found yet. Add entries in <code>blogs.json</code>.</p>
        </section>
    </main>

    <footer>
        <p>&copy; <span class="js-copyright-year" data-start-year="2025"></span> Vincent. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById('nav-toggle').addEventListener('click', function () {
            document.body.classList.toggle('nav-open');
        });

        document.addEventListener('click', function (event) {
            if (!event.target.closest('#nav-toggle') && !event.target.closest('#nav-sheet')) {
                document.body.classList.remove('nav-open');
            }
        });
    </script>
    <script src="site.js"></script>
    <script src="blog.js"></script>
</body>

</html>
